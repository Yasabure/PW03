<div class="container">

  <h1>Cadastro de Cliente</h1>

  <p class="descricao">
    Crie sua conta para comprar com segurança e acompanhar seus pedidos.
  </p>

  <form>

    <!-- NOME -->
    <label for="nome">Nome</label>
    <input
      id="nome"
      name="nome"
      type="text"
      placeholder="Digite seu nome completo"
      minlength="3"
      required
    >

    <!-- EMAIL -->
    <label for="email">Email</label>
    <input
      id="email"
      name="email"
      type="email"
      placeholder="Digite seu email"
      required
    >

    <!-- TELEFONE -->
    <label for="telefone">Telefone</label>
    <input
      id="telefone"
      name="telefone"
      type="tel"
      placeholder="99999-9999"
      pattern="[0-9]{5}-[0-9]{4}"
      required
    >

    <!-- SENHA -->
    <label for="senha">Senha</label>
    <input
      id="senha"
      name="senha"
      type="password"
      placeholder="Crie uma senha"
      minlength="6"
      required
    >

    <!-- CONFIRMAR SENHA -->
    <label for="confirmarSenha">Confirmar senha</label>
    <input
      id="confirmarSenha"
      name="confirmarSenha"
      type="password"
      placeholder="Digite a senha novamente"
      minlength="6"
      required
    >

    <button type="submit">Criar Conta</button>

  </form>

</div>
